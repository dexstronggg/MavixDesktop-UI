<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mavix Map</title>
  <!-- Leaflet + leaflet-rotate подключаем через unpkg CDN. Карта вращается
       так, чтобы курс дрона смотрел ВВЕРХ (bearing = -heading). -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #07090E; }
    #map { width: 100%; height: 100%; background: #07090E; }
    .drone-marker {
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 18px solid #22d3ee;
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.6));
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    // Глобальное состояние карты. Инициализируется при загрузке; обновляется
    // из Python через page().runJavaScript('updateDrone(...)') и т.п.
    var map = L.map('map', {
      rotate: true,
      rotateControl: false,
      zoomControl: false,
      attributionControl: false,
      center: [55.751244, 37.618423], // Москва — нейтральный дефолт до первой телеметрии
      zoom: 16
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);

    var droneMarker = null;
    var destMarker = null;
    var firstFix = true;

    // Иконка дрона — треугольник, который мы НЕ вращаем (карта сама
    // повернётся так, чтобы курс был вверх; треугольник всегда «вверх»).
    var droneIcon = L.divIcon({
      className: 'drone-marker',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    // Обновление позиции дрона + поворот карты по курсу.
    // heading — градусы 0..360. Карту крутим на -heading, чтобы нос смотрел вверх.
    function updateDrone(lat, lon, heading) {
      if (typeof lat !== 'number' || typeof lon !== 'number') { return; }
      var ll = [lat, lon];
      if (droneMarker === null) {
        droneMarker = L.marker(ll, { icon: droneIcon }).addTo(map);
      } else {
        droneMarker.setLatLng(ll);
      }
      if (firstFix) {
        map.setView(ll, 17);
        firstFix = false;
      } else {
        map.panTo(ll);
      }
      if (typeof heading === 'number' && !isNaN(heading) && map.setBearing) {
        map.setBearing(-heading);
      }
    }

    // Маркер точки назначения (из принятой заявки).
    function setDestination(lat, lon) {
      if (typeof lat !== 'number' || typeof lon !== 'number') { return; }
      var ll = [lat, lon];
      if (destMarker === null) {
        destMarker = L.marker(ll).addTo(map);
      } else {
        destMarker.setLatLng(ll);
      }
    }
  </script>
</body>
</html>
